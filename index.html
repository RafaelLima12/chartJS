<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gráficos</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

    <div class="texto"><h1>Gráficos</h1></div>
    <div class="graficos">
        <div>
            <canvas id="linhas"></canvas>
        </div>

        <div>
            <canvas id="barras"></canvas>
        </div>
    </div>

</body>

<script>
    const ctx = document.getElementById('linhas');

    new Chart(ctx, {
        type: 'line',
        data: {
            labels: ['12:00', '13:00', '14:00', '15:00', '16:00', '17:00'],
            datasets: [{
                label: 'Umidade',
                data: [80, 82, 80, 85, 80, 83],
                backgroundColor: 'rgb(69, 91, 148)',
                borderWidth: 2,
                borderColor: 'rgb(69, 91, 148)',
            },
            {
                label: 'Temperatura',
                data: [30, 29, 28, 25, 22, 23],
                backgroundColor: '#ef4444',
                borderWidth: 2,
                borderColor: '#ef4444'
            }]
        },
        options: {
            scales: {
                y: {
                    beginAtZero: true
                }
            }
        }
    });


    const ctxBarra = document.getElementById('barras');

    new Chart(ctxBarra, {
        type: 'bar',
        data: {
            labels: ['Janeiro', 'Fevereiro', 'Março', 'Abril', 'Maio', 'Junho'],
            datasets: [{
                label: 'Umidade média',
                data: [90, 89, 93, 87, 88, 82],
                backgroundColor: 'rgb(69, 91, 148)',
                borderRadius: 8,
                borderWidth: 1
            },
            {
                label: 'Temperatura média',
                data: [22, 24, 27, 23, 20, 18],
                backgroundColor: '#ef4444',
                borderRadius: 8,
                borderWidth: 1
                
            }]
        },
        options: {
            scales: {
                y: {
                    beginAtZero: true
                }
            }
        }
    });
</script>

</html>
